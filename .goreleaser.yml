version: 2

project_name: isnow

dist: dist

# Shell completions and the man page ship in every archive and package. They
# are generated from the CLI's own command tree (the completion and man
# subcommands) into the gitignored var/ tree — never into dist/, which
# goreleaser requires empty after its own cleanup.
before:
  hooks:
    - mkdir -p var/extras/completions var/extras/man
    - sh -c "go run ./cmd/isnow completion bash > var/extras/completions/isnow.bash"
    - sh -c "go run ./cmd/isnow completion zsh > var/extras/completions/isnow.zsh"
    - sh -c "go run ./cmd/isnow completion fish > var/extras/completions/isnow.fish"
    - sh -c "go run ./cmd/isnow man > var/extras/man/isnow.1"

git:
  ignore_tags:
    - "saved/*"

builds:
  - id: "{{ .ProjectName }}"
    main: ./cmd/{{ .ProjectName }}
    binary: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -buildvcs=false
      - -trimpath

archives:
  - id: default
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      - CHANGELOG*
      - src: var/extras/completions/*
        dst: completions
      - src: var/extras/man/*
        dst: man

nfpms:
  - id: packages
    package_name: isnow
    vendor: tsvsheet
    homepage: https://tsvsheet.com
    maintainer: tsvsheet <noreply@tsvsheet.com>
    description: Match instants against isnow date/time patterns — test, derive, explain, schedule, serve.
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: var/extras/completions/isnow.bash
        dst: /usr/share/bash-completion/completions/isnow
      - src: var/extras/completions/isnow.zsh
        dst: /usr/share/zsh/site-functions/_isnow
      - src: var/extras/completions/isnow.fish
        dst: /usr/share/fish/vendor_completions.d/isnow.fish
      - src: var/extras/man/isnow.1
        dst: /usr/share/man/man1/isnow.1

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  mode: keep-existing

snapshot:
  version_template: "0.0.0-SNAPSHOT-{{.ShortCommit}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

